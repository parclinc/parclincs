<style>

:root{
--green:#6DD063;
--teal:#28AC95;
--dark:#111;
--light:#f5f7f9;
}

body{
font-family:'Inter',sans-serif;
margin:0;
background:var(--light);
color:#222;
}

/* HEADER */

header{
background:white;
border-bottom:1px solid #eee;
}

.nav{
max-width:1100px;
margin:auto;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
height:60px;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:500;
}

/* HERO */

.hero{
text-align:center;
padding:60px 20px 40px;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:#666;
max-width:600px;
margin:auto;
}

/* CONTENT */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* MAP CARD */
.parking-marker .pin {
  width: 32px;
  height: 32px;
  background: #1E90FF; /* nice blue */
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  position: relative;
  top: 0;
  left: 0;
  text-align: center;
  color: white;
  font-weight: bold;
  font-family: 'Inter', sans-serif;
}

.parking-marker .pin span {
  display: block;
  transform: rotate(45deg);
  line-height: 32px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.06);
padding:20px;
margin-top:20px;
}

.leaflet-popup-content {
  font-family: 'Inter', sans-serif; /* match your page font */
  font-size: 16px;                  /* readable size */
  color: #222;                       /* dark text */
  line-height: 1.4;                  /* nicer spacing */
}

#map{
height:600px;
border-radius:10px;
}

/* AD SPACE */

.ad{
background:#eef2f4;
height:90px;
display:flex;
align-items:center;
justify-content:center;
margin:25px 0;
border-radius:8px;
font-size:14px;
color:#777;
}

/* FOOTER */

footer{
text-align:center;
padding:40px 20px;
color:#777;
font-size:14px;
}

/* MOBILE */

@media (max-width:700px){

.hero h1{
font-size:28px;
}

#map{
height:420px;
}

.nav-links{
display:none;
}

}

</style>
</head>
